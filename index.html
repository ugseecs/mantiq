<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This page has moved</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 20%, #1c2230, #0f1115 70%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: rise 0.5s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #eef2ff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 26px; height: 26px; stroke: var(--accent); }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  p {
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 28px;
    line-height: 1.5;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 10px;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  a.btn:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }
  .url {
    margin-top: 18px;
    font-size: 12px;
    color: #b6b6b6;
    word-break: break-all;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </svg>
    </div>
    <h1>This page has moved</h1>
    <p>This project now lives at a new address. Click below to go there — you'll be redirected automatically in a few seconds.</p>
    <a class="btn" id="goBtn" href="https://usamagulzar.github.io/mantiq">Take me there →</a>
    <div class="url">https://usamagulzar.github.io/mantiq</div>
  </div>
  <script>
    setTimeout(() => { window.location.href = "https://usamagulzar.github.io/mantiq"; }, 4000);
  </script>
</body>
</html>
