<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"/>
    <link rel="manifest" href="manifest.json">
    <title>mantiq - Logic Visualizer</title>
    
    <style>
        /* Base Reset */
        body { 
            margin: 0; padding: 0; background-color: #0f172a; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100dvh; overflow: hidden; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none; -webkit-touch-callout: none;
        }

        canvas.emscripten { 
            display: block; border: 0; background: #000; 
            outline: none; width: 100vw; height: 100dvh; 
        }

        #loading-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: #0f172a; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        .spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #9400d3; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 24px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-title { color: #f8fafc; font-size: 24px; font-weight: 600; letter-spacing: 0.5px; margin: 0; }
        .loading-subtitle { color: #94a3b8; font-size: 14px; margin-top: 8px; }

        #portrait-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: rgba(15, 23, 42, 0.98); backdrop-filter: blur(5px);
            z-index: 200; color: white; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }

        .rotate-icon { font-size: 48px; margin-bottom: 16px; animation: tilt 2s infinite ease-in-out; }
        @keyframes tilt { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }

        /* STRICT PORTRAIT LOCK */
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex !important; }
            canvas.emscripten { display: none !important; } 
        }

        /* PWA Popup Styling */
        #pwa-popup {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background-color: #1e293b;
            border: 1px solid #334155; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000;
            padding: 16px; text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
    </style>
  </head>
  <body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h1 class="loading-title">mantiq</h1>
        <p class="loading-subtitle">Initializing Logic Engine...</p>
    </div>

    <div id="portrait-warning">
        <div class="rotate-icon">📱</div>
        <h2>Please Rotate Your Device</h2>
        <p style="color: #94a3b8;">mantiq is strictly designed for landscape mode.</p>
    </div>

    <div id="pwa-popup" style="display: none;">
        <div class="pwa-content">
            <h3 style="margin: 0 0 8px 0; color: white;">Install mantiq</h3>
            <p id="pwa-text" style="margin: 0; color: #94a3b8; font-size: 14px;">Add mantiq to your home screen for the offline, fullscreen native experience.</p>
            
            <button id="pwa-install-btn" style="display: none; margin-top: 12px; width: 100%; padding: 10px; background-color: #9400d3; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Install App</button>
            
            <div id="pwa-ios-instructions" style="display: none; margin-top: 12px; color: white; font-size: 13px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 6px;">
                Tap the <b>Share</b> icon <span style="font-size: 16px;">⍗</span> below, then select<br><b>"Add to Home Screen"</b> <span style="font-size: 16px;">⊞</span>.
            </div>
            
            <button id="pwa-close-btn" style="margin-top: 12px; background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; text-decoration: underline;">Not now</button>
        </div>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <script type='text/javascript'>
      // --- PWA INSTALL LOGIC ---
      let deferredPrompt;
      const pwaPopup = document.getElementById('pwa-popup');
      const installBtn = document.getElementById('pwa-install-btn');
      const iosInstructions = document.getElementById('pwa-ios-instructions');
      const closeBtn = document.getElementById('pwa-close-btn');

      const isIos = () => {
          const userAgent = window.navigator.userAgent.toLowerCase();
          return /iphone|ipad|ipod/.test(userAgent);
      };

      const isRunningStandalone = () => {
          return (window.matchMedia('(display-mode: standalone)').matches) || (window.navigator.standalone === true);
      };

      window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          if (!isRunningStandalone()) {
              pwaPopup.style.display = 'block';
              installBtn.style.display = 'block';
          }
      });

      installBtn.addEventListener('click', async () => {
          pwaPopup.style.display = 'none';
          if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              deferredPrompt = null;
          }
      });

      window.addEventListener('load', () => {
          if (isIos() && !isRunningStandalone()) {
              pwaPopup.style.display = 'block';
              iosInstructions.style.display = 'block';
          }
      });

      closeBtn.addEventListener('click', () => {
          pwaPopup.style.display = 'none';
      });

      // --- EMSCRIPTEN MODULE ---
      var Module = {
        preRun: [],
        postRun: [
            function() {
                var overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                    overlay.style.visibility = 'hidden';
                    setTimeout(() => overlay.remove(), 600);
                }
            }
        ],
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) { 
              alert('WebGL context lost. Please reload the page.'); 
              e.preventDefault(); 
          }, false);
          return canvas;
        })(),
        setStatus: function(text) { },
        totalDependencies: 0,
        monitorRunDependencies: function(left) { }
      };
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker registered successfully!');
            })
            .catch(error => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
    <script async src="index.js"></script>
  </body>
</html>
