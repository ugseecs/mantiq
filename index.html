<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"/>
    <link rel="manifest" href="manifest.json">
    <title>Mantiq - Logic Visualizer</title>
    
    <style>
        /* Base Reset */
        body { 
            margin: 0; padding: 0; background-color: #0f172a; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100dvh; overflow: hidden; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none; -webkit-touch-callout: none;
        }

        canvas.emscripten { 
            display: block; border: 0; background: #000; 
            outline: none; width: 100vw; height: 100dvh; 
        }

        #loading-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: #0f172a; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        .spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #9400d3; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 24px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-title { color: #f8fafc; font-size: 24px; font-weight: 600; letter-spacing: 0.5px; margin: 0; }
        .loading-subtitle { color: #94a3b8; font-size: 14px; margin-top: 8px; }

        #portrait-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: rgba(15, 23, 42, 0.98); backdrop-filter: blur(5px);
            z-index: 200; color: white; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }

        .rotate-icon { font-size: 48px; margin-bottom: 16px; animation: tilt 2s infinite ease-in-out; }
        @keyframes tilt { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }

        /* STRICT PORTRAIT LOCK */
        /* If the device is held vertically, force the warning and completely hide the Raylib canvas */
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex !important; }
            canvas.emscripten { display: none !important; } 
        }
    </style>
  </head>
  <body>
    
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h1 class="loading-title">Mantiq</h1>
        <p class="loading-subtitle">Initializing Logic Engine...</p>
    </div>

    <div id="portrait-warning">
        <div class="rotate-icon">📱</div>
        <h2>Please Rotate Your Device</h2>
        <p style="color: #94a3b8;">Mantiq is strictly designed for landscape mode.</p>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <script type='text/javascript'>
      // THE "FIRST TAP" FORCED LOCK
      // Browsers require a user gesture to lock orientation. We attach this to the first tap on the canvas.
      function forceLandscapeOnFirstTap() {
          let elem = document.documentElement;
          
          // 1. Request Fullscreen (Hides URL bar)
          if (elem.requestFullscreen) elem.requestFullscreen().catch(e => {});
          else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
          
          // 2. Force Hardware Landscape Lock
          if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock("landscape").catch(e => {});
          }

          // 3. Remove this listener so it only happens once
          document.removeEventListener('touchstart', forceLandscapeOnFirstTap);
          document.removeEventListener('click', forceLandscapeOnFirstTap);
      }

      // Listen for the absolute first interaction
      document.addEventListener('touchstart', forceLandscapeOnFirstTap, { once: true });
      document.addEventListener('click', forceLandscapeOnFirstTap, { once: true });

      var Module = {
        preRun: [],
        postRun: [
            function() {
                var overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                    overlay.style.visibility = 'hidden';
                    setTimeout(() => overlay.remove(), 600);
                }
            }
        ],
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) { 
              alert('WebGL context lost. Please reload the page.'); 
              e.preventDefault(); 
          }, false);
          return canvas;
        })(),
        setStatus: function(text) { },
        totalDependencies: 0,
        monitorRunDependencies: function(left) { }
      };
    </script>
    <script async src="index.js"></script>
  </body>
</html>
