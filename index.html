<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover" name="viewport">
    <link href="manifest.json" rel="manifest">
    <title>Mantiq - Logic Visualizer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        canvas.emscripten {
            display: block;
            border: 0;
            background: #000;
            outline: 0;
            width: 100%;
            height: 100%;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity .6s ease-out, visibility .6s;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,.1);
            border-left-color: #9400d3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0) }
            100% { transform: rotate(360deg) }
        }

        .loading-title {
            color: #f8fafc;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: .5px;
            margin: 0;
        }

        .loading-subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 8px;
        }

        /* Mobile Block Styling */
        #mobile-block {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: #0f172a;
            z-index: 1000;
            color: #fff;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .warning-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Media Query to show block on small screens */
        @media screen and (max-width: 76px) {
            #mobile-block {
                display: flex;
            }
            #canvas, #loading-overlay {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div id="mobile-block">
        <div class="warning-icon">🚫</div>
        <h1 class="loading-title">Desktop Only</h1>
        <p class="loading-subtitle" style="max-width: 280px; line-height: 1.6;">
            Mantiq is not currently available for mobile phones. Please use a tablet or computer to continue.
        </p>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h1 class="loading-title">Mantiq</h1>
        <p class="loading-subtitle">Initializing Logic Engine...</p>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script>
        // Additional User-Agent check for mobile devices that might have high-res screens
        //const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isMobile = false; //testing
        if (isMobile) {
            // Optional: specifically check if it's NOT a tablet to allow iPad users
            const isTablet = /(ipad|tablet|(android(?!.*mobile))|(windows(?!.*phone)(.*touch))|kindle|playbook|silk|(puffin(?!.*(IP|AP|WP))))/.test(navigator.userAgent.toLowerCase());
            
            if (!isTablet) {
                document.getElementById('mobile-block').style.display = 'flex';
                // Prevents the WebAssembly module from even trying to load
                window.stop();
            }
        }

        var Module = {
            preRun: [],
            postRun: [function() {
                var n = document.getElementById("loading-overlay");
                if (n) {
                    n.style.opacity = "0";
                    n.style.visibility = "hidden";
                    setTimeout(() => n.remove(), 600);
                }
            }],
            print: function(n) { console.log(n) },
            printErr: function(n) { console.error(n) },
            canvas: (function() {
                var n = document.getElementById("canvas");
                n.addEventListener("webglcontextlost", function(e) {
                    alert("WebGL context lost. Please reload the page.");
                    e.preventDefault();
                }, false);
                return n;
            })(),
            setStatus: function(n) {},
            totalDependencies: 0,
            monitorRunDependencies: function(n) {}
        };
    </script>
    <script async src="index.js"></script>
</body>
</html>
